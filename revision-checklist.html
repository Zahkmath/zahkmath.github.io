<!DOCTYPE html>
<html>
<head>
<title>Revision Checklist</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; text-align:center; }

header {
  background:#1e3a8a;
  color:white;
  padding:20px;
}

/* SECTION HEADINGS */
.section-title {
  text-align:left;
  margin:20px auto 10px;
  width:90%;
  max-width:800px;
  font-weight:bold;
  font-size:18px;
}

/* LIST */
ul {
  text-align:left;
  width:90%;
  max-width:800px;
  margin:auto;
  padding-left:20px;
}

/* BUTTON */
button {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#1e3a8a;
  color:white;
  cursor:pointer;
  margin:5px;
}

button:hover { background:#163080; }

/* INPUT + CHECK */
.answer-row {
  display:flex;
  gap:10px;
  margin-top:10px;
}

.answer-row input {
  flex:1;
  padding:8px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  top:0; left:0;
}

.modal-content {
  background:white;
  margin:8% auto;
  padding:20px;
  width:90%;
  max-width:600px;
  border-radius:12px;
  position:relative;
  text-align:left;
}

.close {
  position:absolute;
  right:15px;
  top:10px;
  font-size:28px;
  cursor:pointer;
}

.back {
  margin:30px;
}

.back a {
  text-decoration:none;
  color:#555;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
<h1>Revision Checklist Questions</h1>
</header>

<!-- SECTION 1 -->
<div class="section-title">Convert between hours, minutes and seconds</div>
<ul>
  <li>Q1–Q13 (placeholder questions)</li>
</ul>

<!-- SECTION 2 -->
<div class="section-title">Convert between distance units, km, m, cm</div>
<ul>
  <li>Q14–Q27 (placeholder questions)</li>
</ul>

<!-- BUTTONS (27 PLACEHOLDER QUESTIONS) -->
<div>
<script>
for(let i=1;i<=27;i++){
  document.write(`<button onclick="openModal(${i})">Question ${i}</button>`);
}
</script>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>

    <p id="questionText"></p>

    <div class="answer-row">
      <input id="answerInput" placeholder="Enter answer (numbers, letters, symbols)">
      <button onclick="check()">Check</button>
    </div>

    <span id="result"></span>

  </div>
</div>

<!-- BACK -->
<div class="back">
  <a href="sl-ai.html">⬅ Back to SL AI</a>
</div>

<script>

let currentQuestion = 0;

// OPEN MODAL
function openModal(q){
  currentQuestion = q;
  document.getElementById("modal").style.display="block";

  document.getElementById("answerInput").value="";
  document.getElementById("result").textContent="";

  document.getElementById("questionText").textContent =
    "Question " + q + " (add your actual question text here)";
}

// CLOSE MODAL
function closeModal(){
  document.getElementById("modal").style.display="none";
}

// CLICK OUTSIDE
window.onclick=function(e){
  if(e.target.classList.contains("modal")){
    e.target.style.display="none";
  }
}

// CHECK ANSWER (TEXT-BASED: numbers, letters, symbols)
function check(){
  let value=document.getElementById("answerInput").value.trim();
  let result=document.getElementById("result");

  // placeholder logic (you can later replace with real answers)
  if(value.length > 0){
    result.textContent=" ✅ Answer submitted";
    result.style.color="green";
  } else {
    result.textContent=" ❌ Please enter an answer";
    result.style.color="red";
  }
}

</script>

</body>
</html>
