<!DOCTYPE html>
<html>
<head>
<title>Revision Checklist</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; text-align:center; }

header { background:#1e3a8a; color:white; padding:25px; }
header h1 { margin:0; }

ul { max-width:1000px; margin:30px auto; text-align:left; }

.topic { font-weight:bold; margin-bottom:20px; }

.buttons button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#1e3a8a;
  color:white;
  cursor:pointer;
}
.buttons button:hover { background:#163080; }

.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  top:0; left:0;
}

.modal-content {
  background:white;
  margin:5% auto;
  padding:25px;
  width:90%;
  max-width:700px;
  border-radius:12px;
  position:relative;
  text-align:left;
}

.close {
  position:absolute;
  right:15px;
  top:10px;
  font-size:28px;
  cursor:pointer;
}

input { display:block; margin:10px 0; padding:8px; }

.solution-image {
  max-width:100%;
  max-height:70vh;
  display:block;
  margin:auto;
}

.back { margin:30px; }

</style>
</head>

<body>

<header>
<h1>Revision Checklist Questions</h1>
</header>

<ul>

<li class="topic">Convert between hours, minutes and seconds
<div class="buttons">
<button class="openModal" data-target="q1">Q1</button>
<button class="openModal" data-target="s1">Solution</button>

<button class="openModal" data-target="q2">Q2</button>
<button class="openModal" data-target="s2">Solution</button>
</div>
</li>

<li class="topic">Convert between distance units
<div class="buttons">
<button class="openModal" data-target="q3">Q3</button>
<button class="openModal" data-target="s3">Solution</button>

<button class="openModal" data-target="q4">Q4</button>
<button class="openModal" data-target="s4">Solution</button>
</div>
</li>

<li class="topic">Find percentage of amount
<div class="buttons">
<button class="openModal" data-target="q5">Q5</button>
<button class="openModal" data-target="s5">Solution</button>
</div>
</li>

<li class="topic">Percentage increase and decrease
<div class="buttons">
<button class="openModal" data-target="q6">Q6</button>
<button class="openModal" data-target="s6">Solution</button>
</div>
</li>

<li class="topic">Index laws
<div class="buttons">
<button class="openModal" data-target="q7">Q7</button>
<button class="openModal" data-target="s7">Solution</button>
</div>
</li>

<li class="topic">Simultaneous equations
<div class="buttons">
<button class="openModal" data-target="q8">Q8</button>
<button class="openModal" data-target="s8">Solution</button>

<button class="openModal" data-target="q9">Q9</button>
<button class="openModal" data-target="s9">Solution</button>
</div>
</li>

<li class="topic">Rounding
<div class="buttons">
<button class="openModal" data-target="q10">Q10</button>
<button class="openModal" data-target="s10">Solution</button>
</div>
</li>

<li class="topic">More topics
<div class="buttons">
<!-- Q11–Q30 buttons -->
<script>
for(let i=11;i<=30;i++){
document.write(`
<button class="openModal" data-target="q${i}">Q${i}</button>
<button class="openModal" data-target="s${i}">Solution</button>
`);
}
</script>
</div>
</li>

</ul>

<!-- QUESTIONS AUTO -->
<script>
for(let i=1;i<=30;i++){
document.write(`
<div id="q${i}" class="modal">
<div class="modal-content">
<span class="close">&times;</span>

<p>Question ${i} goes here...</p>

<input id="a${i}" placeholder="Answer">
<button onclick="check('a${i}',0,'r${i}')">Check</button>
<span id="r${i}"></span>

</div>
</div>

<div id="s${i}" class="modal">
<div class="modal-content">
<span class="close">&times;</span>
<img src="solutions-1/q${i}.png" class="solution-image">
</div>
</div>
`);
}
</script>

<div class="back">
<a href="sl-ai.html">⬅ Back to SL AI</a>
</div>

<script>

// OPEN + RESET
document.addEventListener("click", e=>{
if(e.target.classList.contains("openModal")){
let m=document.getElementById(e.target.dataset.target);
m.style.display="block";
m.querySelectorAll("input").forEach(i=>i.value="");
m.querySelectorAll("span").forEach(s=>s.textContent="");
}
});

// CLOSE
document.addEventListener("click", e=>{
if(e.target.classList.contains("close")||e.target.classList.contains("modal")){
e.target.closest(".modal").style.display="none";
}
});

// CHECK
function check(id,correct,res){
let v=parseFloat(document.getElementById(id).value);
let r=document.getElementById(res);
if(!isNaN(v)&&Math.abs(v-correct)<0.01){
r.textContent="✅"; r.style.color="green";
}else{
r.textContent="❌"; r.style.color="red";
}
}

</script>

</body>
</html>
