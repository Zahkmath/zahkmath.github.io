<!DOCTYPE html>
<html>
<head>
<title>Revision Checklist</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; text-align:center; }

header {
  background:#1e3a8a;
  color:white;
  padding:20px;
}

/* LIST */
ul {
  text-align:left;
  width:90%;
  max-width:800px;
  margin:20px auto;
  padding-left:20px;
}

li {
  margin-bottom:15px;
  line-height:1.8;
}

/* BUTTONS */
button {
  padding:6px 10px;
  border:none;
  border-radius:8px;
  background:#1e3a8a;
  color:white;
  cursor:pointer;
  margin-left:5px;
  font-size:13px;
}

button:hover { background:#163080; }

/* INPUT */
input {
  padding:6px;
  margin-left:10px;
  width:180px;
}

/* FEEDBACK */
.feedback {
  margin-left:10px;
  font-weight:bold;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  top:0; left:0;
}

.modal-content {
  background:white;
  margin:8% auto;
  padding:20px;
  width:90%;
  max-width:600px;
  border-radius:12px;
  position:relative;
}

.close {
  position:absolute;
  right:15px;
  top:10px;
  font-size:28px;
  cursor:pointer;
}

.solution-image {
  max-width:100%;
}

</style>
</head>

<body>

<header>
<h1>Revision Checklist Questions</h1>
</header>

<ul>

  <!-- Q1 -->
  <li>
    Convert between hours, minutes and seconds.
    <button onclick="openQuestion(1)">Question 1</button>
    <button onclick="openSolution(1)">Solution 1</button>

    <input id="a1" placeholder="Answer">
    <button onclick="check(1)">Check</button>
    <span id="f1" class="feedback"></span>
  </li>

  <!-- Q2 -->
  <li>
    Convert between distance units, km, m, cm.
    <button onclick="openQuestion(2)">Question 2</button>
    <button onclick="openSolution(2)">Solution 2</button>

    <input id="a2" placeholder="Answer">
    <button onclick="check(2)">Check</button>
    <span id="f2" class="feedback"></span>
  </li>

  <!-- PLACEHOLDER UP TO Q27 -->
  <!-- Copy pattern below for Q3–Q27 -->

  <li>
    Question 3 Topic Placeholder
    <button onclick="openQuestion(3)">Question 3</button>
    <button onclick="openSolution(3)">Solution 3</button>

    <input id="a3" placeholder="Answer">
    <button onclick="check(3)">Check</button>
    <span id="f3" class="feedback"></span>
  </li>

  <li>
    Question 4 Topic Placeholder
    <button onclick="openQuestion(4)">Question 4</button>
    <button onclick="openSolution(4)">Solution 4</button>

    <input id="a4" placeholder="Answer">
    <button onclick="check(4)">Check</button>
    <span id="f4" class="feedback"></span>
  </li>

  <!-- Continue same pattern until Q27 -->

</ul>

<!-- QUESTION MODAL -->
<div id="qModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <p id="qText"></p>
  </div>
</div>

<!-- SOLUTION MODAL -->
<div id="sModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <img id="solImg" class="solution-image">
  </div>
</div>

<script>

let currentQ = 0;

// QUESTION (optional text popup)
function openQuestion(n){
  document.getElementById("qModal").style.display="block";
  document.getElementById("qText").textContent="Question " + n;
  currentQ=n;
}

// SOLUTION IMAGE
function openSolution(n){
  document.getElementById("sModal").style.display="block";
  document.getElementById("solImg").src="q"+n+".png";
}

// CLOSE MODALS
function closeModal(){
  document.getElementById("qModal").style.display="none";
  document.getElementById("sModal").style.display="none";
}

// CHECK ANSWER (TEXT, NUMBERS, SYMBOLS)
function check(n){
  let val=document.getElementById("a"+n).value.trim();
  let fb=document.getElementById("f"+n);

  // placeholder logic (you will replace later with real answers)
  if(val.length>0){
    fb.textContent="✔";
    fb.style.color="green";
  } else {
    fb.textContent="✘";
    fb.style.color="red";
  }
}

</script>

</body>
</html>
