<!DOCTYPE html>
<html>
<head>
<title>Question Example</title>

<style>
body { font-family: Arial; text-align:center; background:#f4f6f9; }

button {
  padding:12px 18px;
  background:#1e3a8a;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

button:hover { background:#163080; }

/* Modal */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

.modal-content {
  background:white;
  margin:10% auto;
  padding:20px;
  width:90%;
  max-width:500px;
  border-radius:10px;
  position:relative;
  text-align:left;
}

.close {
  position:absolute;
  right:10px;
  top:5px;
  font-size:25px;
  cursor:pointer;
}

input {
  padding:8px;
  margin-top:10px;
}

</style>
</head>

<body>

<h2>Revision Questions</h2>

<!-- BUTTON -->
<button onclick="openModal()">Question 1</button>

<!-- MODAL -->
<div id="q1" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>

    <p>A train journey lasts 2 hours 36 minutes. Write the total time in hours.</p>

    <input id="answer" placeholder="Enter answer">

    <br>
    <button onclick="check()">Check</button>

    <span id="result"></span>

  </div>
</div>

<script>

// OPEN
function openModal(){
  document.getElementById("q1").style.display="block";
  document.getElementById("answer").value="";
  document.getElementById("result").textContent="";
}

// CLOSE
function closeModal(){
  document.getElementById("q1").style.display="none";
}

// CLOSE OUTSIDE
window.onclick=function(e){
  if(e.target.classList.contains("modal")){
    e.target.style.display="none";
  }
}

// CHECK ANSWER
function check(){
  let value=parseFloat(document.getElementById("answer").value);
  let result=document.getElementById("result");

  if(!isNaN(value) && Math.abs(value-2.6)<0.01){
    result.textContent=" ✅";
    result.style.color="green";
  } else {
    result.textContent=" ❌";
    result.style.color="red";
  }
}

</script>

</body>
</html>
